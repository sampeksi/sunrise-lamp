<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1c1c1e; padding: 2rem; border-radius: 24px; width: 90%; max-width: 320px; box-sizing: border-box; display: flex; flex-direction: column; align-items: stretch; }
        h1 { font-weight: 300; margin: 0 0 2rem 0; color: #ffd60a; text-align: center; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        input[type="time"] { background: #2c2c2e; border: none; color: #fff; font-size: 1.5rem; padding: 10px; border-radius: 12px; width: 140px; outline: none; }
        label { color: #8e8e93; font-size: 0.9rem; }
        .slider { width: 100%; -webkit-appearance: none; height: 12px; border-radius: 6px; background: linear-gradient(to right, #ff9f0a, #64d2ff); margin: 1.5rem 0 2.5rem 0; outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button { background: #ffd60a; color: #000; border: none; padding: 1.2rem; border-radius: 16px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        button:active { transform: scale(0.98); opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sunrise</h1>
        <div class="row">
            <label>Wake-up</label>
            <input type="time" id="t" value="07:00">
        </div>
        <label style="margin-top:10px">Tone Preview</label>
        <input type="range" id="c" min="0" max="100" value="20" class="slider" oninput="p()">
        <button onclick="s()">Save Alarm</button>
    </div>
    <script>
        function p() { fetch(`/save?t=${document.getElementById('t').value}&c=${document.getElementById('c').value}&p=1`); }
        function s() { fetch(`/save?t=${document.getElementById('t').value}&c=${document.getElementById('c').value}`).then(() => alert("Saved!")); }
    </script>
</body>
</html>
